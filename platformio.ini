; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
boards_dir = boards

[env:t-paper]
platform = espressif32@6.13.0
board = T5-ePaper-S3
framework = arduino
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.f_flash = 80000000L
build_flags =
	-DBOARD_HAS_PSRAM
	-DPSRAM_SPEED=120MHz
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DCORE_DEBUG_LEVEL=0
	-DDISABLE_ALL_LIBRARY_WARNINGS
	-DWIFI_OFF=1
	-DSPI_FREQUENCY=80000000
	-O3
	-Wl,--gc-sections
	-Isrc/mesh/companion
	-DLV_CONF_INCLUDE_SIMPLE
	-Ilib
	
	-DRADIOLIB_STATIC_ONLY=1
	-DRADIOLIB_GODMODE=1
	-DESP32
	-DUSE_SX1262
	-DRADIO_CLASS=CustomSX1262
	-DWRAPPER_CLASS=CustomSX1262Wrapper
	
	-DP_LORA_NSS=46
	-DP_LORA_DIO_1=10
	-DP_LORA_RESET=1
	-DP_LORA_BUSY=47
	-DP_LORA_SCLK=14
	-DP_LORA_MISO=21
	-DP_LORA_MOSI=13
	-DSX126X_DIO2_AS_RF_SWITCH=true
	-DSX126X_DIO3_TCXO_VOLTAGE=1.8
	-DSX126X_CURRENT_LIMIT=140
	-DSX126X_RX_BOOSTED_GAIN=1
	
	-DLORA_FREQ=869.618
	-DLORA_BW=62.5
	-DLORA_SF=8
	-DLORA_TX_POWER=22
	-DLORA_CR=5
	
	-DMAX_CONTACTS=100
	-DMAX_GROUP_CHANNELS=4
	-DENABLE_ADVERT_ON_BOOT=1
	-DENABLE_PRIVATE_KEY_IMPORT=1
	-DENABLE_PRIVATE_KEY_EXPORT=1
	
	-DBLE_PIN_CODE=123456
	-DBLE_NAME_PREFIX='"MeshCore-"'
	-DOFFLINE_QUEUE_SIZE=64
	
	-DRADIOLIB_EXCLUDE_CC1101=1
	-DRADIOLIB_EXCLUDE_RF69=1
	-DRADIOLIB_EXCLUDE_SX1231=1
	-DRADIOLIB_EXCLUDE_SI443X=1
	-DRADIOLIB_EXCLUDE_RFM2X=1
	-DRADIOLIB_EXCLUDE_SX128X=1
	-DRADIOLIB_EXCLUDE_AFSK=1
	-DRADIOLIB_EXCLUDE_AX25=1
	-DRADIOLIB_EXCLUDE_HELLSCHREIBER=1
	-DRADIOLIB_EXCLUDE_MORSE=1
	-DRADIOLIB_EXCLUDE_APRS=1
	-DRADIOLIB_EXCLUDE_BELL=1
	-DRADIOLIB_EXCLUDE_RTTY=1
	-DRADIOLIB_EXCLUDE_SSTV=1
lib_deps = 
	Wire
	SPI
	jgromes/RadioLib @ ^7.6.0
	rweather/Crypto @ ^0.4.0
	adafruit/RTClib @ ^2.1.3
	melopero/Melopero RV3028 @ ^1.1.0
	densaugeo/base64 @ ~1.4.0
	sparkfun/SparkFun u-blox GNSS Arduino Library @ ^2.2.28
	electroniccats/CayenneLPP @ 1.6.1
	lvgl/lvgl@^9.5.0
